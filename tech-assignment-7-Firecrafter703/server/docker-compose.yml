services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: ta7db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build: ./webserver
    ports:
      - "8000:8000"
    volumes:
      - ./webserver:/app
      - /app/.venv
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: rootpass
      DB_NAME: ta7db
      MQTT_BROKER: broker.emqx.io
      MQTT_TOPIC: ece140a/ta7/autograder

    depends_on:
      - db

volumes:
  mysql_data:
